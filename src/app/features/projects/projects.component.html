<section id="projects" class="py-24 bg-surface section-reveal">
  <div class="max-w-6xl mx-auto px-6">
    <!-- Section Header - Centered -->
    <div class="text-center mb-16">
      <h2 class="text-sm font-mono text-accent uppercase tracking-widest mb-4">
        {{ projectsData.sectionLabel }}
      </h2>
      <p class="text-2xl text-text-primary font-semibold">
        {{ projectsData.sectionSubtitle }}
      </p>
      <div class="w-12 h-1 bg-accent mx-auto mt-4 rounded-full"></div>
    </div>

    <!-- Projects Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <article
        *ngFor="let project of projectsData.projects"
        class="project-card bg-surface-raised border border-border rounded-xl overflow-hidden opacity-0 translate-y-8 transition-all duration-700 ease-out hover:shadow-[0_8px_30px_rgba(0,0,0,0.12)] hover:shadow-accent/5 group cursor-pointer"
        style="transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);">
        
        <!-- Thumbnail -->
        <div class="relative aspect-video overflow-hidden bg-surface-overlay">
          <img 
            [src]="project.thumbnail" 
            [alt]="project.title"
            class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.02]">
          
          <!-- Overlay on hover -->
          <div class="absolute inset-0 bg-gradient-to-t from-surface/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        </div>

        <!-- Card Content -->
        <div class="p-6 flex flex-col h-full">
          <!-- Title -->
          <h3 class="text-xl font-bold text-text-primary mb-3 group-hover:text-accent transition-colors duration-400">
            {{ project.title }}
          </h3>

          <!-- Description -->
          <p class="text-text-secondary text-sm leading-relaxed mb-4 flex-grow">
            {{ project.description }}
          </p>

          <!-- Tech Stack Tags -->
          <div class="flex flex-wrap gap-2 mb-4">
            <span
              *ngFor="let tech of project.techStack"
              class="px-3 py-1 text-xs font-medium rounded-full bg-accent-subtle text-accent border border-accent/20">
              {{ tech }}
            </span>
          </div>

          <!-- Links -->
          <div class="flex gap-3 justify-end">
            <button
              *ngIf="project.liveUrl"
              (click)="openLink(project.liveUrl)"
              class="p-2 rounded-lg text-text-muted hover:text-accent hover:bg-surface-hover transition-all duration-300 opacity-60 group-hover:opacity-100"
              [attr.aria-label]="'View live demo of ' + project.title">
              <!-- External Link Icon -->
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
              </svg>
            </button>
            
            <button
              *ngIf="project.githubUrl"
              (click)="openLink(project.githubUrl)"
              class="p-2 rounded-lg text-text-muted hover:text-accent hover:bg-surface-hover transition-all duration-300 opacity-60 group-hover:opacity-100"
              [attr.aria-label]="'View GitHub repository of ' + project.title">
              <!-- GitHub Icon -->
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
              </svg>
            </button>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
